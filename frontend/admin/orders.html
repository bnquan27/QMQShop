<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý đơn hàng — QMQSHOP Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="main-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <img src="../../assets/logo.png" alt="" class="logo-img" />
        <div class="logo-text">
          <span class="logo-brand">QMQ<span>SHOP</span></span>
          <span class="logo-sub">ADMIN</span>
        </div>
      </a>
      <div class="header-tools" id="auth-header-section"></div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/admin/dashboard.html"><i class="fa-solid fa-gauge-high"></i> Tổng quan</a>
      <a href="/admin/products.html"><i class="fa-solid fa-box"></i> Sản phẩm</a>
      <a href="/admin/orders.html" class="active"><i class="fa-solid fa-truck"></i> Đơn hàng</a>
      <a href="/"><i class="fa-solid fa-arrow-left"></i> Về trang chủ</a>
    </aside>

    <main class="admin-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h1 style="margin-bottom:0;">ĐƠN HÀNG</h1>
        <select class="form-input" id="status-filter" style="width:auto;padding:8px 36px 8px 12px;font-size:13px;" onchange="filterOrders()">
          <option value="">Tất cả trạng thái</option>
          <option value="pending">Chờ xác nhận</option>
          <option value="confirmed">Đã xác nhận</option>
          <option value="shipping">Đang giao</option>
          <option value="delivered">Đã giao</option>
          <option value="cancelled">Đã hủy</option>
        </select>
      </div>

      <table class="data-table" id="orders-table">
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Khách hàng</th>
            <th>Địa chỉ</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
            <th>Ngày</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr><td colspan="7" style="text-align:center;color:var(--text-muted);">Đang tải...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3 id="detail-title">Chi tiết đơn hàng</h3>
        <button class="modal-close" onclick="closeDetailModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="detail-content">
        <div class="loading-center"><div class="spinner"></div><span>Đang tải...</span></div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    let allOrders = [];

    const statusLabels = {
      pending: 'Chờ xác nhận', confirmed: 'Đã xác nhận',
      shipping: 'Đang giao', delivered: 'Đã giao', cancelled: 'Đã hủy'
    };

    async function loadOrders() {
      try {
        allOrders = await API.adminGetOrders();
        renderTable();
      } catch (err) {
        document.getElementById('orders-body').innerHTML =
          `<tr><td colspan="7" style="text-align:center;color:var(--text-muted);">Lỗi: ${err.message}</td></tr>`;
      }
    }

    function filterOrders() {
      renderTable();
    }

    function renderTable() {
      const filter = document.getElementById('status-filter').value;
      let filtered = allOrders;
      if (filter) {
        filtered = allOrders.filter(o => o.status === filter);
      }

      const tbody = document.getElementById('orders-body');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);">Không tìm thấy đơn hàng</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(o => `
        <tr>
          <td style="font-family:var(--font-display);color:var(--accent);font-size:14px;">#QMQ${String(o.id).padStart(5,'0')}</td>
          <td style="font-size:13px;">${o.full_name || ('User #' + o.user_id)}${o.phone ? '<br><span style="color:var(--text-muted);font-size:12px;">'+o.phone+'</span>' : ''}</td>
          <td style="font-size:13px;color:var(--text-secondary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${o.shipping_address || '—'}</td>
          <td style="color:var(--accent);font-family:var(--font-display);">${formatPrice(o.total_amount)}</td>
          <td>
            <select class="form-input" style="width:auto;padding:4px 28px 4px 8px;font-size:12px;" onchange="updateStatus(${o.id}, this.value)">
              ${['pending','confirmed','shipping','delivered','cancelled'].map(s =>
                `<option value="${s}" ${s === o.status ? 'selected' : ''}>${statusLabels[s]}</option>`
              ).join('')}
            </select>
          </td>
          <td style="font-size:13px;color:var(--text-muted);">${new Date(o.created_at).toLocaleDateString('vi-VN')}</td>
          <td>
            <button class="btn-ghost btn-sm" onclick="viewDetail(${o.id})" style="color:var(--accent);"><i class="fa-regular fa-eye"></i></button>
          </td>
        </tr>
      `).join('');
    }

    async function updateStatus(id, newStatus) {
      try {
        await API.adminUpdateOrderStatus(id, newStatus);
        Toast.success('Đã cập nhật trạng thái');
        await loadOrders();
      } catch (err) {
        Toast.error(err.message);
      }
    }

    async function viewDetail(id) {
      document.getElementById('detail-modal').classList.add('show');
      document.getElementById('detail-content').innerHTML =
        '<div class="loading-center"><div class="spinner"></div><span>Đang tải...</span></div>';

      try {
        const order = await API.adminGetOrderDetail(id);
        document.getElementById('detail-title').textContent = `Đơn hàng #QMQ${String(order.id).padStart(5,'0')}`;
        document.getElementById('detail-content').innerHTML = `
          <div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);">
              <div>
                <span class="order-status status-${order.status}" style="font-size:13px;">${statusLabels[order.status] || order.status}</span>
              </div>
              <span style="color:var(--text-muted);font-size:13px;">${new Date(order.created_at).toLocaleDateString('vi-VN')}</span>
            </div>

            <div style="font-size:14px;color:var(--text-secondary);margin-bottom:12px;">
              <div style="margin-bottom:4px;"><i class="fa-solid fa-user" style="width:20px;color:var(--accent);"></i> ${order.full_name || ('User #' + order.user_id)}</div>
              <div style="margin-bottom:4px;"><i class="fa-solid fa-location-dot" style="width:20px;color:var(--accent);"></i> ${order.shipping_address || '—'}</div>
              <div style="margin-bottom:4px;"><i class="fa-solid fa-phone" style="width:20px;color:var(--accent);"></i> ${order.phone || '—'}</div>
              ${order.note ? `<div style="margin-bottom:4px;"><i class="fa-solid fa-note-sticky" style="width:20px;color:var(--accent);"></i> ${order.note}</div>` : ''}
            </div>

            <h4 style="font-size:14px;letter-spacing:1px;margin-bottom:8px;">SẢN PHẨM</h4>
            <div style="border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px;">
              ${order.items.map(item => `
                <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;">
                  <span style="color:var(--text-primary);">${item.product_name} × ${item.quantity}</span>
                  <span style="color:var(--accent);">${formatPrice(item.price * item.quantity)}</span>
                </div>
              `).join('')}
            </div>

            <div style="display:flex;justify-content:space-between;padding:12px 0;font-size:18px;border-top:1px solid var(--border);">
              <span style="font-weight:700;">Tổng cộng</span>
              <span style="font-family:var(--font-display);color:var(--accent);">${formatPrice(order.total_amount)}</span>
            </div>

            <div style="margin-top:16px;">
              <label style="display:block;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Cập nhật trạng thái</label>
              <select class="form-input" style="width:100%;padding:8px 36px 8px 12px;font-size:13px;" onchange="updateStatusFromDetail(${order.id}, this.value)">
                ${['pending','confirmed','shipping','delivered','cancelled'].map(s =>
                  `<option value="${s}" ${s === order.status ? 'selected' : ''}>${statusLabels[s]}</option>`
                ).join('')}
              </select>
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById('detail-content').innerHTML =
          `<div style="text-align:center;color:var(--text-muted);padding:40px;">Lỗi: ${err.message}</div>`;
      }
    }

    async function updateStatusFromDetail(id, newStatus) {
      try {
        await API.adminUpdateOrderStatus(id, newStatus);
        Toast.success('Đã cập nhật trạng thái');
        viewDetail(id);
        await loadOrders();
      } catch (err) {
        Toast.error(err.message);
      }
    }

    function closeDetailModal() {
      document.getElementById('detail-modal').classList.remove('show');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
        window.location.href = '/auth.html';
        return;
      }
      Auth.updateHeader();
      await loadOrders();
    });
  </script>
</body>
</html>
