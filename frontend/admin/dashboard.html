<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tổng quan — QMQSHOP Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="main-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <img src="../../assets/logo.png" alt="" class="logo-img" />
        <div class="logo-text">
          <span class="logo-brand">QMQ<span>SHOP</span></span>
          <span class="logo-sub">ADMIN</span>
        </div>
      </a>
      <div class="header-tools" id="auth-header-section"></div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/admin/dashboard.html" class="active"><i class="fa-solid fa-gauge-high"></i> Tổng quan</a>
      <a href="/admin/products.html"><i class="fa-solid fa-box"></i> Sản phẩm</a>
      <a href="/admin/orders.html"><i class="fa-solid fa-truck"></i> Đơn hàng</a>
    </aside>

    <main class="admin-main">
      <h1>TỔNG QUAN</h1>

      <div class="admin-stats" id="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Tổng sản phẩm</div>
          <div class="stat-value" id="stat-products">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Tổng đơn hàng</div>
          <div class="stat-value" id="stat-orders">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sản phẩm tồn kho</div>
          <div class="stat-value" id="stat-lowstock">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Đang chờ xác nhận</div>
          <div class="stat-value" id="stat-pending">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Đã hoàn thành</div>
          <div class="stat-value" id="stat-delivered">—</div>
        </div>
      </div>

      <!-- ============================================================
           Revenue Chart
           ============================================================ -->
      <div class="revenue-chart-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
          <h2 style="font-size:20px;letter-spacing:1px;margin:0;">DOANH THU</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn-outline btn-sm" id="revenue-mode-btn" onclick="toggleRevenueMode()">
              <i class="fa-solid fa-calendar-week"></i> 30 ngày
            </button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="revenue-chart" height="220"></canvas>
        </div>
        <div class="revenue-total-bar">
          <span class="revenue-total-label">Tổng doanh thu:</span>
          <span class="revenue-total-value" id="revenue-total-value"></span>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;margin-top:32px;">
        <h2 style="font-size:20px;letter-spacing:1px;">ĐƠN HÀNG GẦN ĐÂY</h2>
        <a href="/admin/orders.html" class="btn-outline btn-sm">Xem tất cả <i class="fa-solid fa-arrow-right"></i></a>
      </div>
      <table class="data-table" id="recent-orders-table">
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Khách hàng</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
            <th>Ngày</th>
          </tr>
        </thead>
        <tbody id="recent-orders-body">
          <tr><td colspan="5" style="text-align:center;color:var(--text-muted);">Đang tải...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    let chartMode = '30d'; // '30d' or 'today'

    const statusLabels = {
      pending: 'Chờ xác nhận', confirmed: 'Đã xác nhận',
      shipping: 'Đang giao', delivered: 'Đã giao', cancelled: 'Đã hủy'
    };

    async function loadDashboard() {
      try {
        const [products, orders] = await Promise.all([
          API.adminGetProducts(),
          API.adminGetOrders()
        ]);

        window._allOrders = orders;
        const totalProducts = products.length;
        const totalOrders = orders.length;
        const totalRevenue = orders
          .filter(o => o.status !== 'cancelled')
          .reduce((s, o) => s + Number(o.total_amount), 0);
        const lowStock = products.reduce((s, p) => s + p.stock, 0);
        const pendingOrders = orders.filter(o => o.status === 'pending').length;
        const deliveredOrders = orders.filter(o => o.status === 'delivered').length;

        document.getElementById('stat-products').textContent = totalProducts;
        document.getElementById('stat-orders').textContent = totalOrders;
        document.getElementById('stat-lowstock').textContent = lowStock;
        document.getElementById('stat-pending').textContent = pendingOrders;
        document.getElementById('stat-delivered').textContent = deliveredOrders;

        const tbody = document.getElementById('recent-orders-body');
        if (orders.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">Chưa có đơn hàng</td></tr>';
          return;
        }

        tbody.innerHTML = orders.slice(0, 8).map(o => `
          <tr>
            <td style="font-family:var(--font-display);color:var(--accent);">#QMQ${String(o.id).padStart(5,'0')}</td>
             <td>${o.full_name || 'User #' + o.user_id}</td>
            <td style="color:var(--accent);">${formatPrice(o.total_amount)}</td>
            <td><span class="order-status status-${o.status}">${statusLabels[o.status] || o.status}</span></td>
            <td style="color:var(--text-muted);font-size:13px;">${new Date(o.created_at).toLocaleDateString('vi-VN')}</td>
          </tr>
        `).join('');

        drawRevenueChart(orders);
      } catch (err) {
        document.getElementById('stats-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);">Lỗi: ${err.message}</div>`;
      }
    }

    // ============================================================
    // Revenue chart (Chart.js)
    // ============================================================
    let revenueChartInstance = null;

    function getCssColor(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function drawRevenueChart(orders) {
      if (revenueChartInstance) {
        revenueChartInstance.destroy();
        revenueChartInstance = null;
      }

      const isToday = chartMode === 'today';
      const now = new Date();
      const activeOrders = orders.filter(o => o.status !== 'cancelled');

      // Build buckets
      let labels, values;
      if (isToday) {
        const buckets = Array.from({length: 24}, (_, h) => {
          const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h);
          return {label: String(h).padStart(2,'0') + ':00', start, end: new Date(start.getTime() + 3600000), revenue: 0};
        });
        for (const o of activeOrders) {
          const t = new Date(o.created_at);
          for (const b of buckets) {
            if (t >= b.start && t < b.end) { b.revenue += Number(o.total_amount); break; }
          }
        }
        labels = buckets.map(b => b.label);
        values = buckets.map(b => b.revenue);
      } else {
        const buckets = Array.from({length: 30}, (_, i) => {
          const d = new Date(now);
          d.setDate(d.getDate() - (29 - i));
          d.setHours(0,0,0,0);
          const end = new Date(d);
          end.setDate(end.getDate() + 1);
          return {label: String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0'), start: d, end, revenue: 0};
        });
        for (const o of activeOrders) {
          const t = new Date(o.created_at);
          for (const b of buckets) {
            if (t >= b.start && t < b.end) { b.revenue += Number(o.total_amount); break; }
          }
        }
        labels = buckets.map(b => b.label);
        values = buckets.map(b => b.revenue);
      }

      // Total for current mode
      const totalDisplay = values.reduce((s, v) => s + v, 0);
      document.getElementById('revenue-total-value').textContent = formatPrice(totalDisplay);

      // Colors
      const accent = getCssColor('--accent') || '#f97316';
      const border = getCssColor('--border') || '#2a2a3a';
      const textMuted = getCssColor('--text-muted') || '#888';
      const bgCard = getCssColor('--bg-card') || '#1a1a2e';

      const canvas = document.getElementById('revenue-chart');
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, 220);
      gradient.addColorStop(0, accent);
      gradient.addColorStop(1, accent + '30');

      revenueChartInstance = new Chart(canvas, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Doanh thu',
            data: values,
            backgroundColor: gradient,
            borderColor: accent,
            borderWidth: 1,
            borderRadius: 4,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => formatPrice(ctx.parsed.y)
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: {
                color: textMuted,
                font: { size: 10 },
                maxRotation: 0,
                autoSkip: false,
                callback: function(val, idx) {
                  const step = isToday ? 3 : 5;
                  return idx % step === 0 || idx === labels.length - 1 ? labels[idx] : '';
                }
              }
            },
            y: {
              beginAtZero: true,
              border: { display: false },
              grid: { color: border + '60' },
              ticks: {
                color: textMuted,
                font: { size: 11 },
                callback: (v) => formatPrice(v)
              }
            }
          }
        }
      });
    }

    function toggleRevenueMode() {
      chartMode = chartMode === '30d' ? 'today' : '30d';
      const btn = document.getElementById('revenue-mode-btn');
      if (chartMode === 'today') {
        btn.innerHTML = '<i class="fa-solid fa-calendar-day"></i> Hôm nay';
      } else {
        btn.innerHTML = '<i class="fa-solid fa-calendar-week"></i> 30 ngày';
      }
      drawRevenueChart(window._allOrders || []);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
        window.location.href = '/auth.html';
        return;
      }
      Auth.updateHeader();
      loadDashboard();
    });
  </script>
</body>
</html>
