<!DOCTYPE html>
<html lang="vi">
<head>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('qmq_theme') || 'dark')</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sản phẩm — QMQSHOP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="main-header">
    <div class="header-inner">
      <button class="hamburger" onclick="document.querySelector('.category-nav').classList.toggle('show')"><span></span><span></span><span></span></button>
      <a href="/" class="logo">
        <img src="../assets/logo.png" alt="" class="logo-img" />
        <div class="logo-text">
          <span class="logo-brand">QMQ<span>SHOP</span></span>
          <span class="logo-sub">SINCE 2026</span>
        </div>
      </a>
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="Tìm sản phẩm..." onkeydown="if(event.key==='Enter') applySearch()" />
      </div>
      <div class="header-tools" id="auth-header-section"></div>
    </div>
  </header>

  <nav class="category-nav">
    <div class="nav-inner">
      <a href="/" class="nav-item"><i class="fa-solid fa-house"></i> Trang chủ</a>
      <a href="/products.html" class="nav-item">Tất cả</a>
      <a href="/products.html?category=1" class="nav-item">Laptop Gaming</a>
      <a href="/products.html?category=2" class="nav-item">PC Gaming</a>
      <a href="/products.html?category=3" class="nav-item">PC Văn Phòng</a>
      <a href="/products.html?category=4" class="nav-item">Linh Kiện</a>
    </div>
  </nav>

  <main class="container" style="padding:30px 20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
      <h1 style="font-size:24px;letter-spacing:2px;">SẢN PHẨM</h1>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <select class="form-input" id="category-filter" style="width:auto;padding:8px 36px 8px 12px;font-size:13px;" onchange="applyFilters()">
          <option value="">Tất cả danh mục</option>
        </select>
        <select class="form-input" id="sort-select" style="width:auto;padding:8px 36px 8px 12px;font-size:13px;" onchange="applyFilters()">
          <option value="newest">Mới nhất</option>
          <option value="price_asc">Giá: Thấp → Cao</option>
          <option value="price_desc">Giá: Cao → Thấp</option>
          <option value="name">Tên A → Z</option>
        </select>
        <span id="result-count" style="font-size:13px;color:var(--text-muted);"></span>
      </div>
    </div>

    <div class="product-grid" id="product-grid">
      <div class="loading-center" style="grid-column:1/-1;">
        <div class="spinner"></div>
        <span>Đang tải sản phẩm...</span>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>

  <footer class="main-footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="logo-text" style="margin-bottom:12px;">
            <span class="logo-brand">QMQ<span>SHOP</span></span>
            <span class="logo-sub">SINCE 2026</span>
          </div>
          <p>QMQSHOP - Laptop, PC Gaming & Linh Kiện Chính Hãng.</p>
        </div>
        <div class="footer-col">
          <h5>Danh mục</h5>
          <a href="/products.html?category=1">Laptop Gaming</a>
          <a href="/products.html?category=2">PC Gaming</a>
          <a href="/products.html?category=3">PC Văn Phòng</a>
          <a href="/products.html?category=4">Linh Kiện</a>
        </div>
        <div class="footer-col">
          <h5>Liên hệ</h5>
          <a href="#">1900.xxxx</a>
          <a href="#">info@qmqshop.com</a>
        </div>
      </div>
      <div class="footer-bottom">
        <span>&copy; 2026 QMQSHOP</span>
      </div>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/compare.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    let currentPage = 1;

    async function loadCategories() {
      try {
        const cats = await API.getCategories();
        const sel = document.getElementById('category-filter');
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    function applyFilters() {
      currentPage = 1;
      loadProducts();
    }

    function applySearch() {
      currentPage = 1;
      loadProducts();
    }

    async function loadProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '<div class="loading-center" style="grid-column:1/-1;"><div class="spinner"></div><span>Đang tải...</span></div>';

      const search = document.getElementById('search-input').value.trim();
      const category = document.getElementById('category-filter').value;
      const sort = document.getElementById('sort-select').value;

      // Preserve URL params
      const url = new URL(window.location);
      if (search) url.searchParams.set('search', search);
      else url.searchParams.delete('search');
      if (category) url.searchParams.set('category', category);
      else url.searchParams.delete('category');
      if (sort && sort !== 'newest') url.searchParams.set('sort', sort);
      else url.searchParams.delete('sort');
      url.searchParams.set('page', currentPage);
      window.history.replaceState({}, '', url);

      try {
        const data = await API.getProducts({ search, category, sort, page: currentPage, limit: 12 });
        document.getElementById('result-count').textContent = `${data.total} sản phẩm`;

        if (!data.products || data.products.length === 0) {
          grid.innerHTML = `<div class="loading-center" style="grid-column:1/-1;">
            <i class="fa-regular fa-face-frown" style="font-size:40px;color:var(--text-muted);"></i>
            <span style="font-size:16px;color:var(--text-secondary);">Không tìm thấy sản phẩm</span>
          </div>`;
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        grid.innerHTML = data.products.map(renderCard).join('');
        renderPagination(data.total_pages, data.page);
      } catch (err) {
        grid.innerHTML = `<div class="loading-center" style="grid-column:1/-1;"><span>Lỗi: ${err.message}</span></div>`;
      }
    }

    function renderCard(p) {
      const img = p.images && p.images[0] || '';
      const discount = p.old_price > p.price ? Math.round((1 - p.price/p.old_price)*100) : 0;
      return `<div class="product-card">
        ${discount > 0 ? `<span class="badge badge-red">-${discount}%</span>` : ''}
        <a href="/product.html?id=${p.id}" class="product-img-wrap">
          <img src="${img}" alt="${p.name}" loading="lazy" />
        </a>
        <a href="/product.html?id=${p.id}" class="product-name">${p.name}</a>
        <div class="product-specs">${p.specs && p.specs.CPU || ''} ${p.specs && p.specs.GPU ? '| '+p.specs.GPU : ''}</div>
        <div class="product-price-row">
          <span class="price-current">${formatPrice(p.price)}</span>
          ${p.old_price ? `<span class="price-old">${formatPrice(p.old_price)}</span>` : ''}
        </div>
        <button class="btn-add-cart" onclick="event.preventDefault(); Cart.add(${p.id})"><i class="fa-solid fa-cart-plus"></i> Thêm vào giỏ</button>
      </div>`;
    }

    function renderPagination(totalPages, current) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = ''; return; }

      let html = `<button class="page-btn" onclick="goPage(${current-1})" ${current <= 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i></button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="goPage(${current+1})" ${current >= totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>`;
      el.innerHTML = html;
    }

    function goPage(p) { currentPage = p; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}); }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      Auth.updateHeader();
      await Cart.load();
      await Compare.load();
      await loadCategories();

      // Apply URL params
      const sp = params.get('search'); if (sp) document.getElementById('search-input').value = sp;
      const cat = params.get('category'); if (cat) document.getElementById('category-filter').value = cat;
      const sort = params.get('sort'); if (sort) document.getElementById('sort-select').value = sort;
      const page = params.get('page'); if (page) currentPage = parseInt(page);

      loadProducts();
    });
  </script>
</body>
</html>
