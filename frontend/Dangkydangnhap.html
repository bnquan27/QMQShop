<!doctype html>
<html lang="vi">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Đăng nhập & Đăng ký - QMQShop</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<link rel="stylesheet" href="css/Dangkydangnhap.css" />
</head>

<body>
	<div class="auth-container">
		<div style="text-align: center; margin-bottom: 25px">
			<img src="../assets/logo.png" alt="Logo" style="height: 65px; width: auto" />
			<h1 style="
            color: #ff3333;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 5px;
          ">
				QMQSHOP
			</h1>
		</div>
		<div class="auth-tabs">
			<button class="tab-btn active" onclick="switchTab('login')">
				Đăng nhập
			</button>
			<button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
		</div>

		<form id="login-form" class="auth-form active">
			<h2>Chào mừng trở lại QMQShop!</h2>
			<div class="input-group">
				<i class="fa-solid fa-envelope"></i>
				<input type="email" placeholder="Email của bạn" required />
			</div>
			<div class="input-group">
				<i class="fa-solid fa-lock"></i>
				<input type="password" placeholder="Mật khẩu" required />
			</div>
			<div class="form-actions"></div>
			<button type="submit" class="submit-btn">Đăng nhập</button>
		</form>

		<form id="register-form" class="auth-form">
			<h2>Tạo tài khoản mới</h2>
			<div class="input-group">
				<i class="fa-solid fa-user"></i>
				<input type="text" placeholder="Họ và tên" required />
			</div>
			<div class="input-group">
				<i class="fa-solid fa-envelope"></i>
				<input type="email" placeholder="Email của bạn" required />
			</div>

			<div class="input-group">
				<i class="fa-solid fa-phone"></i>
				<input type="tel" placeholder="Số điện thoại" pattern="[0-9]{10}"
					title="Vui lòng nhập đúng 10 chữ số số điện thoại" required />
			</div>

			<div class="input-group">
				<i class="fa-solid fa-map-marker-alt"></i>
				<input type="text" placeholder="Địa chỉ giao hàng" required />
			</div>

			<div class="input-group">
				<i class="fa-solid fa-lock"></i>
				<input type="password" placeholder="Mật khẩu (tối thiểu 6 ký tự)" required />
			</div>
			<div class="input-group">
				<i class="fa-solid fa-shield"></i>
				<input type="password" placeholder="Xác nhận mật khẩu" required />
			</div>
			<div class="form-actions">
				<label><input type="checkbox" required /> Tôi đồng ý với điều khoản dịch
					vụ</label>
			</div>
			<button type="submit" class="submit-btn">Đăng ký</button>
		</form>
	</div>

	<script src="js/Dangkydangnhap.js"></script>
</body>

</html>
